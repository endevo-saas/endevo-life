version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - cd $CODEBUILD_SRC_DIR/endevo-life && npm install -g pnpm@9 && pnpm install --no-frozen-lockfile
        build:
          commands:
            - cd $CODEBUILD_SRC_DIR/endevo-life && pnpm run build --filter=@endevo/web
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - apps/web/.next/cache/**/*
      buildSettings:
        platform: WEB_COMPUTE
