version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - cd $CODEBUILD_SRC_DIR/endevo-aws-shahzad && npm install --legacy-peer-deps
        build:
          commands:
            - cd $CODEBUILD_SRC_DIR/endevo-aws-shahzad && npx turbo run build --filter=@endevo/web
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - apps/web/.next/cache/**/*
      buildSettings:
        platform: WEB_COMPUTE
