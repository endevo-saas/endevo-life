name: E2E Integration Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/web/**'
      - '.github/workflows/e2e-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/**'
  workflow_dispatch:
    inputs:
      test_filter:
        description: 'Grep pattern to filter tests (e.g. "Flow 1")'
        required: false
        default: ''

jobs:
  e2e:
    name: E2E Tests — ${{ matrix.shard }}/3
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    env:
      # These are mocked in tests — no real backend required for CI
      NEXT_PUBLIC_API_URL: https://4jms6sdzk9.execute-api.us-east-1.amazonaws.com
      NEXT_PUBLIC_BOOKING_LINK: https://calendly.com/endevo/1-on-1-session
      E2E_EMPLOYEE_EMAIL: test.employee@endevo.com
      E2E_ACCESS_TOKEN: e2e-test-token
      E2E_HR_EMAIL: test.hr@endevo.com
      E2E_HR_ACCESS_TOKEN: e2e-hr-test-token
      E2E_ADMIN_EMAIL: test.admin@endevo.com
      E2E_ADMIN_ACCESS_TOKEN: e2e-admin-test-token
      # Suppress Next.js telemetry
      NEXT_TELEMETRY_DISABLED: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Build Next.js app
        working-directory: apps/web
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ env.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_BOOKING_LINK: ${{ env.NEXT_PUBLIC_BOOKING_LINK }}

      - name: Start Next.js server
        working-directory: apps/web
        run: |
          npx next start -p 3000 &
          # Wait until the server responds
          npx wait-on http://localhost:3000 --timeout 60000
        env:
          NEXT_PUBLIC_API_URL: ${{ env.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_BOOKING_LINK: ${{ env.NEXT_PUBLIC_BOOKING_LINK }}

      - name: Run E2E tests (shard ${{ matrix.shard }}/3)
        working-directory: apps/web
        run: |
          GREP="${{ github.event.inputs.test_filter }}"
          if [ -n "$GREP" ]; then
            npx playwright test --shard=${{ matrix.shard }}/3 --grep="$GREP" --reporter=list,junit
          else
            npx playwright test --shard=${{ matrix.shard }}/3 --reporter=list,junit
          fi
        env:
          CI: true

      - name: Upload test results (JUnit XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results-shard-${{ matrix.shard }}
          path: apps/web/test-results/**/*.xml
          retention-days: 14

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: apps/web/playwright-report/
          retention-days: 14

      - name: Upload trace files (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-shard-${{ matrix.shard }}
          path: apps/web/test-results/**/*.zip
          retention-days: 7

  # Merge shard results and publish consolidated report
  report:
    name: Publish Test Report
    needs: e2e
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download all JUnit results
        uses: actions/download-artifact@v4
        with:
          pattern: junit-results-shard-*
          merge-multiple: true
          path: all-results/

      - name: Download all HTML reports
        uses: actions/download-artifact@v4
        with:
          pattern: playwright-report-shard-*
          merge-multiple: true
          path: playwright-report/

      - name: Upload merged results
        uses: actions/upload-artifact@v4
        with:
          name: e2e-full-report
          path: playwright-report/
          retention-days: 30

      - name: Comment PR with test summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const path = require('path')

            // Count test results from JUnit XMLs
            let passed = 0, failed = 0, skipped = 0

            const xmlFiles = fs.readdirSync('all-results/').filter(f => f.endsWith('.xml'))
            for (const file of xmlFiles) {
              const content = fs.readFileSync(path.join('all-results', file), 'utf8')
              const passMatch = content.match(/tests="(\d+)"/)
              const failMatch = content.match(/failures="(\d+)"/)
              const skipMatch = content.match(/skipped="(\d+)"/)
              if (passMatch) passed += parseInt(passMatch[1])
              if (failMatch) failed += parseInt(failMatch[1])
              if (skipMatch) skipped += parseInt(skipMatch[1])
            }

            const icon = failed > 0 ? 'x' : 'white_check_mark'
            const status = failed > 0 ? 'FAILED' : 'PASSED'

            const body = [
              `## :${icon}: E2E Tests — ${status}`,
              '',
              `| Result | Count |`,
              `|--------|-------|`,
              `| Passed | ${passed} |`,
              `| Failed | ${failed} |`,
              `| Skipped | ${skipped} |`,
              '',
              'Artifacts: [Download HTML Report](../actions/runs/${{ github.run_id }})',
            ].join('\n')

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            })
