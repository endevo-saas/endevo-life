name: Deploy Infrastructure (CDK)

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/**'
      - '.github/workflows/deploy-infrastructure.yml'

  workflow_dispatch: # manual trigger from GitHub UI

jobs:
  deploy:
    name: CDK Deploy — All AWS Resources
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infrastructure/package.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install CDK dependencies
        working-directory: infrastructure
        run: npm install

      - name: CDK Bootstrap (first time only — safe to re-run)
        working-directory: infrastructure
        run: npx cdk bootstrap aws://${{ secrets.AWS_ACCOUNT_ID }}/${{ secrets.AWS_REGION }}

      - name: CDK Diff (show what will change)
        working-directory: infrastructure
        run: npx cdk diff --all
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          GH_TOKEN_AMPLIFY: ${{ secrets.GH_TOKEN_AMPLIFY }}

      - name: CDK Deploy (create/update all AWS resources)
        working-directory: infrastructure
        run: npx cdk deploy --all --require-approval never --outputs-file ../cdk-outputs.json
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          GH_TOKEN_AMPLIFY: ${{ secrets.GH_TOKEN_AMPLIFY }}

      - name: Upload CDK outputs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: cdk-outputs
          path: cdk-outputs.json
