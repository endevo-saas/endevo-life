name: Deploy App (Amplify)

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'amplify.yml'
      - '.github/workflows/deploy-app.yml'

  workflow_dispatch:

jobs:
  deploy:
    name: Trigger Amplify Build
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get Amplify App ID
        id: amplify
        run: |
          APP_ID=$(aws amplify list-apps --region ${{ secrets.AWS_REGION }} \
            --query 'apps[?starts_with(name, `endevo-uat`)].appId' \
            --output text)
          echo "app_id=$APP_ID" >> $GITHUB_OUTPUT
          echo "Amplify App ID: $APP_ID"

      - name: Trigger Amplify build (skip if already running)
        run: |
          APP_ID=${{ steps.amplify.outputs.app_id }}
          # Check if a build is already running — if so, skip gracefully
          RUNNING=$(aws amplify list-jobs \
            --app-id $APP_ID \
            --branch-name main \
            --max-results 1 \
            --region ${{ secrets.AWS_REGION }} \
            --query 'jobSummaries[0].status' \
            --output text)
          if [ "$RUNNING" = "RUNNING" ] || [ "$RUNNING" = "PENDING" ]; then
            echo "✅ Amplify build already in progress (status: $RUNNING) — skipping trigger"
          else
            aws amplify start-job \
              --app-id $APP_ID \
              --branch-name main \
              --job-type RELEASE \
              --region ${{ secrets.AWS_REGION }}
            echo "✅ Amplify build triggered"
          fi

      - name: Show current build status
        run: |
          APP_ID=${{ steps.amplify.outputs.app_id }}
          STATUS=$(aws amplify list-jobs \
            --app-id $APP_ID \
            --branch-name main \
            --max-results 1 \
            --region ${{ secrets.AWS_REGION }} \
            --query 'jobSummaries[0].{Status:status,JobId:jobId}' \
            --output table)
          echo "$STATUS"
